<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Engineering Interview — AI 应用工程 + Java/Python 后端高频面试题与面渣口述" />
  <title>AI Engineering Interview</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #2563eb;
      /* 全局放大阅读字号（默认约 15px，调到 18px） */
      --base-font-size: 18px;
      --sidebar-font-size: 16px;
      --code-font-size: 15px;
    }
    html, body {
      font-size: var(--base-font-size);
    }
    .app-name-link {
      font-weight: 700;
      font-size: 1.15rem;
    }
    /* 正文 */
    .markdown-section {
      max-width: 960px;
      font-size: 1.05rem;
      line-height: 1.75;
    }
    .markdown-section h1 {
      font-size: 2rem;
      line-height: 1.35;
    }
    .markdown-section h2 {
      font-size: 1.55rem;
      line-height: 1.4;
    }
    .markdown-section h3 {
      font-size: 1.28rem;
    }
    .markdown-section h4 {
      font-size: 1.12rem;
    }
    .markdown-section p,
    .markdown-section li {
      font-size: 1.05rem;
      line-height: 1.75;
    }
    .markdown-section table {
      display: table;
      width: 100%;
      font-size: 1rem;
    }
    .markdown-section th,
    .markdown-section td {
      padding: 0.55em 0.75em;
      font-size: 1rem;
      line-height: 1.55;
    }
    .markdown-section code,
    .markdown-section pre,
    .markdown-section pre > code {
      font-size: var(--code-font-size) !important;
      line-height: 1.55;
    }
    .markdown-section blockquote {
      font-size: 1.05rem;
      line-height: 1.7;
    }
    /* 侧栏 */
    .sidebar {
      font-size: var(--sidebar-font-size);
    }
    .sidebar ul li a {
      font-size: 0.98rem;
      line-height: 1.55;
    }
    .sidebar-nav strong {
      font-size: 1.02rem;
    }
    /* 顶栏 / 搜索 */
    .app-nav a {
      font-size: 1rem;
    }
    .search input {
      font-size: 1rem !important;
    }
    .search .matching-post {
      font-size: 0.95rem;
    }
    /* 分页 */
    .pagination-item-title,
    .pagination-item-label {
      font-size: 1rem !important;
    }
    /* 移动端略收一点，避免过挤 */
    @media screen and (max-width: 768px) {
      :root {
        --base-font-size: 17px;
        --code-font-size: 14px;
      }
      .markdown-section {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中…</div>
  <script>
    window.$docsify = {
      name: 'AI Engineering Interview',
      repo: 'https://github.com/cyforkk/ai-engineering-interview',
      homepage: 'README.md',
      basePath: './docs/',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      maxLevel: 4,
      auto2top: true,
      relativePath: true,
      notFoundPage: true,
      search: {
        paths: 'auto',
        placeholder: '搜索面试题 / 知识点',
        noData: '没有结果',
        depth: 4,
      },
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md',
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true,
      },
      plugins: [
        function (hook, vm) {
          hook.beforeEach(function (html) {
            var url =
              'https://github.com/cyforkk/ai-engineering-interview/blob/main/docs/' +
              vm.route.file;
            return (
              html +
              '\n\n---\n\n' +
              '<small>📝 [编辑本页](' + url + ') · 仓库 [ai-engineering-interview](https://github.com/cyforkk/ai-engineering-interview)</small>\n'
            );
          });
        },
      ],
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>
  <!-- Mermaid 架构图 -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
</body>
</html>
